services:
  db:
    image: postgres:15-alpine
    container_name: arcanum-db
    restart: always
    environment:
      POSTGRES_USER: arcanum
      POSTGRES_PASSWORD: arcanumpassword
      POSTGRES_DB: arcanum
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arcanum -d arcanum"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: arcanum-backend
    restart: always
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      DATABASE_URL: postgresql://arcanum:arcanumpassword@db:5432/arcanum?schema=public
      JWT_SECRET: secret123
      PORT: 3001
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/casas"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: sh -c "npm run start"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: arcanum-frontend
    restart: always
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - backend

volumes:
  postgres_data:
